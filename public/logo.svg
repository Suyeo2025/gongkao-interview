<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Outer ink ring - black brush stroke feel -->
  <circle cx="32" cy="32" r="29" stroke="#1a1a1a" stroke-width="2" opacity="0.15"
    stroke-dasharray="5 2 8 1.5 12 2.5"
  />
  <!-- Main seal ring - vermillion red, traditional 朱印 style -->
  <circle cx="32" cy="32" r="26" stroke="#b91c1c" stroke-width="3.2" stroke-linecap="round" opacity="0.88"
    stroke-dasharray="3 0.6 10 0.4 7 0.8 14 0.5 9 0.7 6 0.3 16"
  />
  <!-- Inner accent ring - darker red -->
  <circle cx="32" cy="32" r="22.5" stroke="#991b1b" stroke-width="0.6" opacity="0.25"
    stroke-dasharray="4 3 6 2"
  />
  <!-- "琦" character - black ink -->
  <text x="32" y="41" text-anchor="middle" font-family="'Noto Serif SC', 'SimSun', 'KaiTi', serif" font-size="26" font-weight="800" fill="#1a1a1a">琦</text>
  <!-- Subtle ink marks for handmade feel -->
  <circle cx="51" cy="11" r="1" fill="#b91c1c" opacity="0.18"/>
  <circle cx="12" cy="50" r="0.7" fill="#1a1a1a" opacity="0.12"/>
</svg>
